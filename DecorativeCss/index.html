<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>CSS background</title>
  </head>
  <body>
    <div class="container">
      <section class="bg-section">
        <h2>1. Element shadow</h2>
        <div class="example-row">
          <div class="example-box shadow-basical">Shadow basic</div>
          <div class="example-box shadow-blur">Shadow blur</div>
          <div class="example-box shadow-multiple">Shadow multiple</div>
        </div>
      </section>

      <section class="bg-section">
        <h2>2. Text shadow</h2>
        <div class="example-row">
          <div class="example-box shadow-basic-text">Shadow basic</div>
          <div class="example-box shadow-glow">Shadow glow</div>
        
        </div>
      </section>

      <section class="bg-section">
        <h2>3. Borders</h2>
        <div class="example-row">
          <div class="example-box border-radius">border-radius</div>
          <div class="example-box border-image">border-image</div>
          <div class="example-box outline-effect">Outline</div>
        </div>
      </section>

      <section class="bg-section">
        <h2>4. Filter</h2>
        <div class="example-row">
          <div class="example-box blur-filter">blur filer</div>
        </div>
      </section>
    </div>
  </body>
</html>
